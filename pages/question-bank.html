<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Question Bank | DevPrep AI</title>

    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link rel="stylesheet" href="../assets/css/question-bank.css">

</head>

<body>

    <div class="dashboard-layout">

        <!-- Sidebar -->

        <aside class="sidebar">

            <div class="sidebar-logo">
                <h2>DevPrep AI</h2>
            </div>

            <nav class="sidebar-menu">

                <a href="dashboard.html">Dashboard</a>

                <a href="question-bank.html" class="active">
                    Questions
                </a>

                <a href="#">Mock Tests</a>

                <a href="#">Coding Practice</a>

                <a href="#">Resume Analyzer</a>

                <a href="#">AI Interview</a>

                <a href="#">Roadmap</a>

                <a href="#">Bookmarks</a>

                <a href="#">Profile</a>

                <a href="#">Logout</a>

            </nav>

        </aside>

        <!-- Main -->

        <main class="dashboard-main">

            <header class="dashboard-header">

                <div>

                    <h1>Question Bank 📚</h1>

                    <p>
                        Practice company specific interview questions.
                    </p>

                </div>

            </header>

            <section class="question-bank">

                <!-- Search -->

                <div class="search-section">

                    <input type="text" placeholder="Search interview questions...">

                </div>

                <!-- Filters -->

                <div class="filters">

                    <select>
                        <option>Company</option>
                    </select>

                    <select>
                        <option>Topic</option>
                    </select>

                    <select>
                        <option>Difficulty</option>
                    </select>

                </div>

                <!-- Questions -->

                <div class="questions-list">

                    <!-- Card 1 -->

                    <div class="question-card">

                        <div class="question-tags">

                            <span class="company">
                                Amazon
                            </span>

                            <span class="topic">
                                DSA
                            </span>

                            <span class="difficulty medium">
                                Medium
                            </span>

                        </div>

                        <h3>
                            Two Sum Problem
                        </h3>

                        <div class="question-actions">

                            <button>
                                🔖 Bookmark
                            </button>

                            <button class="view-btn">
                                View Answer
                            </button>

                        </div>

                    </div>

                    <!-- Card 2 -->

                    <div class="question-card">

                        <div class="question-tags">

                            <span class="company">
                                Google
                            </span>

                            <span class="topic">
                                System Design
                            </span>

                            <span class="difficulty hard">
                                Hard
                            </span>

                        </div>

                        <h3>
                            Design URL Shortener
                        </h3>

                        <div class="question-actions">

                            <button>
                                🔖 Bookmark
                            </button>

                            <button class="view-btn">
                                View Answer
                            </button>

                        </div>

                    </div>

                </div>

                <!-- Pagination -->

                <div class="pagination">

                    <button>1</button>

                    <button>2</button>

                    <button>3</button>

                    <button>Next</button>

                </div>

            </section>

        </main>

    </div>

</body>

</html>
