<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Settings | DevPrep AI</title>

    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link rel="stylesheet" href="../assets/css/settings.css">

</head>

<body>

<div class="dashboard-layout">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="sidebar-logo">
            <h2>DevPrep AI</h2>
        </div>

        <nav class="sidebar-menu">

            <a href="dashboard.html">Dashboard</a>
            <a href="question-bank.html">Questions</a>
            <a href="mock-tests.html">Mock Tests</a>
            <a href="coding-practice.html">Coding Practice</a>
            <a href="resume-analyzer.html">Resume Analyzer</a>
            <a href="ai-interview.html">AI Interview</a>
            <a href="roadmap.html">Roadmap</a>
            <a href="bookmarks.html">Bookmarks</a>
            <a href="profile.html">Profile</a>

            <a href="settings.html" class="active">
                Settings
            </a>

            <a href="../index.html">
                Logout
            </a>

        </nav>

    </aside>

    <!-- Main -->

    <main class="dashboard-main">

        <header class="dashboard-header">

            <div>

                <h1>Settings ⚙️</h1>

                <p>
                    Manage your account preferences.
                </p>

            </div>

        </header>

        <section class="settings-grid">

            <div class="settings-card">

                <h3>Account Settings</h3>

                <input type="text" placeholder="Full Name">

                <input type="email" placeholder="Email Address">

                <button>
                    Save Changes
                </button>

            </div>

            <div class="settings-card">

                <h3>Security</h3>

                <input type="password" placeholder="New Password">

                <button>
                    Update Password
                </button>

            </div>

            <div class="settings-card">

                <h3>Notifications</h3>

                <p>Email Notifications</p>

                <button>
                    Enabled
                </button>

            </div>

            <div class="settings-card">

                <h3>Theme</h3>

                <p>Dark Mode (UI Only)</p>

                <button>
                    🌙 Enable
                </button>

            </div>

        </section>

    </main>

</div>

</body>

</html>
